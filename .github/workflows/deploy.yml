name: Deploy to Docker Hub and Slot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: demo/demo

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: demo/demo
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

           - name: Triển khai lên DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/spring-boot-app"
          TAG="latest"
          SLOT=2
          CONTAINER_PORT=80
          URL="${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=$TAG&slot=$SLOT&containerPort=$CONTAINER_PORT"
          echo "Gửi yêu cầu đến: $URL"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST --max-time 60 "$URL")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP code: $CODE"
          # Nếu là 524 (timeout của Cloudflare), coi như thành công vì request đã đến server
          if [ "$CODE" = "524" ]; then
            echo "Webhook đã nhận request, nhưng server xử lý chậm (524). Coi như thành công."
            exit 0
          fi
          if [[ ! "$CODE" =~ ^[0-9]+$ ]]; then
            echo "Không nhận được HTTP code hợp lệ"
            exit 1
          fi
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại với mã $CODE"
            echo "$BODY"
            exit 1
          fi
          echo "Deploy thành công!"