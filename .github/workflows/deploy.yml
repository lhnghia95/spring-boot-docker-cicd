name: Deploy to Docker Hub and Slot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: demo/demo

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: demo/demo
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/spring-boot-app:${{ github.sha }}

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="${{ secrets.DOCKER_USERNAME }}/spring-boot-app"
          TAG="latest"
          SLOT=2
          CONTAINER_PORT=80
          URL="${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=$TAG&slot=$SLOT&containerPort=$CONTAINER_PORT"
          echo "Gửi yêu cầu đến: $URL"

          # Tạm thời tắt exit-on-error để xử lý curl
          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST --max-time 60 "$URL" 2>&1)
          CURL_EXIT=$?
          set -e

          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "HTTP code: $CODE"

          # Nếu curl timeout (exit 28) hoặc HTTP 524 (Cloudflare timeout) -> coi như thành công
          if [ $CURL_EXIT -eq 28 ]; then
            echo "Curl timeout (exit 28). Request likely reached server. Treating as success."
            exit 0
          fi

          if [[ "$CODE" =~ ^[0-9]+$ ]]; then
            if [ "$CODE" = "524" ]; then
              echo "Webhook 524 (Cloudflare timeout). Treating as success."
              exit 0
            fi
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 300 ]; then
              echo "Deploy thành công!"
              exit 0
            else
              echo "Deploy thất bại với mã $CODE"
              echo "$RESPONSE"
              exit 1
            fi
          else
            echo "Không nhận được HTTP code hợp lệ. Curl exit: $CURL_EXIT"
            echo "Response: $RESPONSE"
            exit 1
          fi